<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DanceMate — Documenti legali</title>
<meta name="robots" content="index,follow">
<style>
  :root{
    --ink:#1c1b22; --muted:#5a5866; --line:#e7e5ee;
    --viola:#5b30b0; --verde:#2ec57e; --bg:#ffffff; --maxw:760px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.62;font-size:17px;}
  .band{background:linear-gradient(135deg,var(--verde) 0%,var(--viola) 120%);color:#fff;padding:40px 20px;}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 20px}
  .brand{display:flex;align-items:center;gap:12px;font-weight:700}
  .note{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.18);
    display:flex;align-items:center;justify-content:center;font-size:20px}
  h1{font-size:1.55rem;margin:18px 0 6px;line-height:1.2}
  .band p{margin:0;opacity:.92;font-size:.98rem}
  main{padding:34px 0 60px}
  a.card{display:block;border:1px solid var(--line);border-radius:14px;padding:18px 20px;
    margin:14px 0;text-decoration:none;color:var(--ink)}
  a.card:hover{border-color:var(--viola)}
  a.card strong{color:var(--viola);font-size:1.08rem}
  a.card span{display:block;color:var(--muted);font-size:.92rem;margin-top:4px}
  footer{border-top:1px solid var(--line);padding:22px 0 50px;color:var(--muted);font-size:.9rem}
</style>
</head>
<body>
<header class="band">
  <div class="wrap">
    <div class="brand"><span class="note">&#9835;</span> DanceMate</div>
    <h1>Documenti legali</h1>
    <p>Informativa sulla Privacy e Termini di Servizio</p>
  </div>
</header>
<main>
  <div class="wrap">
    <a class="card" href="./privacy.html">
      <strong>Informativa sulla Privacy</strong>
      <span>Come trattiamo i tuoi dati personali (GDPR)</span>
    </a>
    <a class="card" href="./terms.html">
      <strong>Termini di Servizio</strong>
      <span>Le regole d'uso dell'app</span>
    </a>
    <footer>
      DanceMate — Titolare: Paolo Marchionetti · paolo.marchionetti@gmail.com
    </footer>
  </div>
</main>
</body>
</html>
